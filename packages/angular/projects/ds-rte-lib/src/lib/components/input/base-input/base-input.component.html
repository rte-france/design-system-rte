<div
  class="container {{ labelPosition() }}"
  [ngClass]="{ error: error(), 'compact-spacing': compactSpacing() }"
  [style.width]="width()"
>
  <ng-container *ngIf="label()">
    <div class="text">
      <div class="label-container">
        <label
          id="input-label-{{ id() }}"
          class="input-label"
          [attr.for]="useLabelForAttribute() && id() ? id() : null"
          (click)="onLabelClick($event)"
        >
          {{ label() }}
        </label>
        <ng-container *ngIf="required()">
          <ng-container *ngIf="showLabelRequirement(); else requiredIcon">
            <span class="required-text">(obligatoire)</span>
          </ng-container>
          <ng-template #requiredIcon>
            <span class="required-icon-container">
              <rte-icon name="asterisk" [size]="8" />
            </span>
          </ng-template>
        </ng-container>
        <ng-container *ngIf="!required() && showLabelRequirement()">
          <span class="required-text">(optionnel)</span>
        </ng-container>
      </div>
      <ng-container *ngIf="displayCounter() && labelPosition() === 'top'">
        <p class="input-counter" data-testid="input-counter">{{ characterCount() }}/{{ maxLength() }}</p>
      </ng-container>
    </div>
  </ng-container>

  <div class="input-container">
    <div class="input {{ labelPosition() }}" [ngClass]="{ disabled: disabled(), 'read-only': readOnly() }">
      <div class="input-bar" [ngClass]="{ 'with-left-icon': displayedLeftIcon() }">
        <ng-container *ngIf="displayedLeftIcon()">
          <rte-icon appearance="outlined" class="left-icon" aria-hidden="true" [name]="displayedLeftIcon()!" />
        </ng-container>

        @if (showProjectedShell()) {
          <div
            class="input-field input-field--projected"
            [ngClass]="{
              error: error(),
              highlighted: highlighted(),
              'input-field--disabled': disabled(),
              'input-field--read-only': readOnly(),
            }"
          >
            <ng-content select="[rteBaseInputControl]" />
          </div>
        } @else {
          <input
            #inputRef
            class="input-field"
            [id]="id()"
            [ngClass]="{ error: error(), highlighted: highlighted() }"
            [ngStyle]="customStyle()"
            [attr.aria-label]="ariaLabel()"
            [attr.aria-labelledby]="computedAriaLabelledby()"
            [attr.aria-required]="ariaRequired()"
            [type]="computedInputType()"
            [maxLength]="maxLength()"
            [disabled]="disabled()"
            [readOnly]="readOnly()"
            [value]="internalValue()"
            [placeholder]="placeholder()"
            [attr.autocomplete]="autocomplete()"
            (input)="handleChange($event)"
            (blur)="inputBlur.emit()"
            (keydown)="handleKeyDown($event)"
          />
        }

        <ng-container *ngIf="shouldShowRightIcon()">
          <rte-icon-button
            appearance="outlined"
            variant="neutral"
            class="right-icon"
            data-testid="right-icon"
            [size]="rightIconSize()"
            [compactSpacing]="true"
            [disabled]="disabled()"
            [name]="computedRightIconName()!"
            [ariaLabel]="computedRightIconAriaLabel()"
            (clickEvent)="onRightIconClickHandler($event)"
            (keydown)="onRightIconKeyDownHandler($event)"
          />
        </ng-container>
      </div>
      <div class="right-slot">
        <ng-content select="[baseInputRightSlot]"></ng-content>
        <ng-content select="[baseTextInputRightSlot]"></ng-content>
      </div>
    </div>

    <ng-container *ngIf="assistiveTextLabel()">
      <div class="assistive-text" [attr.id]="assistiveTextId() ?? null">
        <ng-container *ngIf="showAssistiveIcon() && assistiveAppearance() === 'error'">
          <rte-icon name="error" appearance="outlined" class="assistive-icon-error" [size]="12" />
        </ng-container>
        <ng-container *ngIf="showAssistiveIcon() && assistiveAppearance() === 'success'">
          <rte-icon name="check" appearance="outlined" class="assistive-icon-success" [size]="12" />
        </ng-container>
        <ng-container *ngIf="assistiveAppearance() === 'link'; else assistiveLabel">
          <rte-link [label]="assistiveTextLabel()" />
        </ng-container>
        <ng-template #assistiveLabel>
          <p class="assistive-label" [ngClass]="assistiveAppearance()">
            {{ assistiveTextLabel() }}
          </p>
        </ng-template>
      </div>
    </ng-container>
  </div>

  <ng-container *ngIf="displayCounter() && labelPosition() === 'side'">
    <p class="input-counter" data-testid="input-counter">{{ characterCount() }}/{{ maxLength() }}</p>
  </ng-container>
</div>

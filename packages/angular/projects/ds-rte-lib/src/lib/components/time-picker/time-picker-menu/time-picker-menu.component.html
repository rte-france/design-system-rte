<div class="rte-time-picker-dropdown">
  <div class="rte-time-picker-segment-root">
    <div class="rte-time-picker-segment-container">
      <div class="rte-time-picker-segment-controls">
        <button
          type="button"
          class="rte-time-picker-segment-controls-button"
          tabindex="-1"
          [attr.aria-label]="'Increase ' + menuSegmentUnitAriaNoun(menuHoursSegment) + ' value'"
          (click)="onHoursIncrementClick()"
        >
          <rte-icon name="arrow-chevron-up" appearance="outlined" [size]="24" />
        </button>
        <input
          class="rte-time-picker-segment-input"
          type="text"
          [value]="hours() || '00'"
          [readOnly]="isHourReadOnly()"
          (keydown)="onHoursKeydown($event)"
          (input)="onHoursInput($event)"
        />
        <button
          type="button"
          class="rte-time-picker-segment-controls-button"
          tabindex="-1"
          [attr.aria-label]="'Decrease ' + menuSegmentUnitAriaNoun(menuHoursSegment) + ' value'"
          (click)="onHoursDecrementClick()"
        >
          <rte-icon name="arrow-chevron-down" appearance="outlined" [size]="24" />
        </button>
      </div>
      <span>h</span>
    </div>
    <span class="rte-time-picker-segment-separator">:</span>
  </div>
  <div class="rte-time-picker-segment-root">
    <div class="rte-time-picker-segment-container">
      <div class="rte-time-picker-segment-controls">
        <button
          type="button"
          class="rte-time-picker-segment-controls-button"
          tabindex="-1"
          [attr.aria-label]="'Increase ' + menuSegmentUnitAriaNoun(menuMinutesSegment) + ' value'"
          (click)="onMinutesIncrementClick()"
        >
          <rte-icon name="arrow-chevron-up" appearance="outlined" [size]="24" />
        </button>
        <input
          class="rte-time-picker-segment-input"
          type="text"
          [value]="minutes() || '00'"
          [readOnly]="isMinuteReadOnly()"
          (keydown)="onMinutesKeydown($event)"
          (input)="onMinutesInput($event)"
        />
        <button
          type="button"
          class="rte-time-picker-segment-controls-button"
          tabindex="-1"
          [attr.aria-label]="'Decrease ' + menuSegmentUnitAriaNoun(menuMinutesSegment) + ' value'"
          (click)="onMinutesDecrementClick()"
        >
          <rte-icon name="arrow-chevron-down" appearance="outlined" [size]="24" />
        </button>
      </div>
      <span>m</span>
    </div>
    <span class="rte-time-picker-segment-separator">:</span>
  </div>
  <div class="rte-time-picker-segment-root">
    <div class="rte-time-picker-segment-container">
      <div class="rte-time-picker-segment-controls">
        <button
          type="button"
          class="rte-time-picker-segment-controls-button"
          tabindex="-1"
          [attr.aria-label]="'Increase ' + menuSegmentUnitAriaNoun(menuSecondsSegment) + ' value'"
          (click)="onSecondsIncrementClick()"
        >
          <rte-icon name="arrow-chevron-up" appearance="outlined" [size]="24" />
        </button>
        <input
          class="rte-time-picker-segment-input"
          type="text"
          [value]="seconds() || '00'"
          [readOnly]="isSecondReadOnly()"
          (keydown)="onSecondsKeydown($event)"
          (input)="onSecondsInput($event)"
        />
        <button
          type="button"
          class="rte-time-picker-segment-controls-button"
          tabindex="-1"
          [attr.aria-label]="'Decrease ' + menuSegmentUnitAriaNoun(menuSecondsSegment) + ' value'"
          (click)="onSecondsDecrementClick()"
        >
          <rte-icon name="arrow-chevron-down" appearance="outlined" [size]="24" />
        </button>
      </div>
      <span>s</span>
    </div>
  </div>
</div>

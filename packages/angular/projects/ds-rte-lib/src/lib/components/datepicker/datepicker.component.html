<div
  rteDropdown
  rteDropdownPosition="bottom"
  rteDropdownAlignment="start"
  [rteDropdownAutoOpen]="false"
  [rteDropdownAutofocus]="true"
  [rteDropdownIsOpen]="isOpen()"
  [rteDropdownWidth]="dropdownWidth()"
  (clickedOutside)="onClickedOutside()"
  (closedDropdown)="onClosedDropdown()"
>
  <div #inputRootRef>
    <rte-base-input
      rteDropdownTrigger
      rightIcon="calendar-month"
      [id]="id()"
      [label]="hasLabel() ? labelText() : ''"
      [labelPosition]="labelPosition()"
      [required]="required()"
      [showLabelRequirement]="isRequiredOptional() ? showLabelRequirement() : false"
      [assistiveTextLabel]="hasAssistiveText() ? assistiveTextLabel() : ''"
      [assistiveAppearance]="isError() ? 'error' : assistiveTextAppearance()"
      [showAssistiveIcon]="showAssistiveIcon()"
      [value]="textValue()"
      [error]="isError()"
      [disabled]="isDisabled()"
      [readOnly]="isReadOnly()"
      [rightIconAriaLabel]="calendarButtonAriaLabel()"
      (valueChange)="onInputValueChange($event)"
      (rightIconClick)="onCalendarIconTriggered($event)"
      (rightIconKeydown)="onCalendarIconTriggered($event)"
      (inputBlur)="onInputBlurred()"
    >
    </rte-base-input>
  </div>

  <rte-dropdown-menu>
    <ng-template rteDropdownMenuBody>
      <rte-datepicker-menu
        [calendarType]="calendarType()"
        [viewDate]="viewDate()"
        [selectedDate]="selectedDate()"
        [pendingDate]="pendingDate()"
        [minDate]="minDate()"
        [maxDate]="maxDate()"
        [disabledDate]="disabledDate()"
        [locale]="locale()"
        [focusSessionId]="menuFocusSessionId()"
        [initialActiveDate]="menuInitialActiveDate()"
        (dismiss)="onDismiss()"
        (dateSelected)="onMenuDateSelected($event)"
        (dateHovered)="onMenuViewDateChanged($event)"
        (calendarTypeChange)="onMenuCalendarTypeChange($event)"
        (cancel)="onCancel()"
        (confirm)="onConfirm()"
      />
    </ng-template>
  </rte-dropdown-menu>
</div>

name: Main CI

on:
  push:
    branches:
      - main

permissions: read-all

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Create/Update Release Pull Request
        id: changesets
        uses: changesets/action@v1.5.3
        with:
          title: "chore(release): update package versions"
          commit: "chore(release): update package versions"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        run: npm run changelog

      - name: Commit changelog to PR
        if: steps.changesets.outputs.pullRequestNumber
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: update main changelog" --no-verify || exit 0
          git push origin -u changeset-release/main

      - name: Trigger Storybook Preview
        run: |
          gh workflow run storybook-preview.yaml \
            --ref main \
            --field branch=changeset-release/main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

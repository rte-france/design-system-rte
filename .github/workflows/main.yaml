name: Main CI

on:
  push:
    branches:
      - main

permissions: read-all

jobs:
  detect-affected:
    name: Detect affected packages
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.detect.outputs.core }}
      react: ${{ steps.detect.outputs.react }}
      angular: ${{ steps.detect.outputs.angular }}
      isChangesetReleaseMerge: ${{ steps.detect.outputs.isChangesetReleaseMerge }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files and derive flags
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          baseSha="${{ github.event.before }}"
          headSha="${{ github.sha }}"

          changedFiles="$(git diff --name-only "$baseSha" "$headSha")"

          echo "Changed files:"
          echo "$changedFiles"

          latestCommitMessage="$(git log -1 --pretty=%B)"
          echo "Latest commit message:"
          echo "$latestCommitMessage"

          isChangesetReleaseMerge="false"
          if echo "$latestCommitMessage" | grep -qiF 'changeset-release/'; then
            isChangesetReleaseMerge="true"
          fi

          coreChanged="false"
          reactChanged="false"
          angularChanged="false"

          if echo "$changedFiles" | grep -qE '^packages/core/'; then
            coreChanged="true"
          fi
          if echo "$changedFiles" | grep -qE '^packages/react/'; then
            reactChanged="true"
          fi
          if echo "$changedFiles" | grep -qE '^packages/angular/'; then
            angularChanged="true"
          fi

          core="$coreChanged"
          react="$reactChanged"
          angular="$angularChanged"

          if [[ "$coreChanged" == "true" ]]; then
            react="true"
            angular="true"
          fi
          if [[ "$reactChanged" == "true" || "$angularChanged" == "true" ]]; then
            core="true"
          fi

          echo "core=$core" >> "$GITHUB_OUTPUT"
          echo "react=$react" >> "$GITHUB_OUTPUT"
          echo "angular=$angular" >> "$GITHUB_OUTPUT"
          echo "isChangesetReleaseMerge=$isChangesetReleaseMerge" >> "$GITHUB_OUTPUT"

  global-install:
    runs-on: ubuntu-latest
    needs: detect-affected
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules and Vite cache
        id: cache-packages
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
          key: deps-node20-main-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            deps-node20-main-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Cache icons
        id: cache-icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Generate icons
        if: ${{ needs.detect-affected.outputs.react == 'true' || needs.detect-affected.outputs.angular == 'true' }}
        run: npm run generate:icons

      - name: Build Core Package
        working-directory: packages/core
        run: npm run build

      - name: Cache Build Core
        id: cache-build-core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

  quality-react:
    runs-on: ubuntu-latest
    needs: [detect-affected, global-install]
    if: ${{ needs.detect-affected.outputs.isChangesetReleaseMerge != 'true' && needs.detect-affected.outputs.react == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
          key: deps-node20-main-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            deps-node20-main-

      - name: Restore cache icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache build core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Lint
        working-directory: packages/react
        run: npm run lint:fix

      - name: Build React Package
        working-directory: packages/react
        run: npm run build

      - name: Run tests
        working-directory: packages/react
        run: npm run test:ci

  build-react:
    runs-on: ubuntu-latest
    needs: [detect-affected, quality-react]
    if: ${{ needs.detect-affected.outputs.isChangesetReleaseMerge != 'true' && needs.detect-affected.outputs.react == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
          key: deps-node20-main-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            deps-node20-main-

      - name: Restore cache icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            icons

      - name: Restore cache build core
        id: cache-build-core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Build Core Package
        if: steps.cache-build-core.outputs.cache-hit != 'true'
        working-directory: packages/core
        run: npm run build

      - name: Cache react build output
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/dist
          key: react-build-${{ hashFiles('./packages/react/dist/react.js') }}

      - name: Build project
        working-directory: packages/react
        run: npm run build

  quality-angular:
    runs-on: ubuntu-latest
    needs: [detect-affected, global-install]
    if: ${{ needs.detect-affected.outputs.isChangesetReleaseMerge != 'true' && needs.detect-affected.outputs.angular == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
          key: deps-node20-main-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            deps-node20-main-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Restore cache icons
        id: cache-icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Generate icons
        if: steps.cache-icons.outputs.cache-hit != 'true'
        run: npm run generate:icons

      - name: Restore cache build core
        id: cache-build-core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Build Core Package
        if: steps.cache-build-core.outputs.cache-hit != 'true'
        working-directory: packages/core
        run: npm run build

      - name: Lint
        working-directory: packages/angular
        run: npm run lint:fix

      - name: Run tests
        working-directory: packages/angular
        run: npm run test:ci
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  build-angular:
    runs-on: ubuntu-latest
    needs: [detect-affected, quality-angular]
    if: ${{ needs.detect-affected.outputs.isChangesetReleaseMerge != 'true' && needs.detect-affected.outputs.angular == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
          key: deps-node20-main-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            deps-node20-main-

      - name: Restore cache icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Build project
        working-directory: packages/angular
        run: npm run build

  prepare-release:
    needs: [detect-affected, global-install, quality-react, build-react, quality-angular, build-angular]
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() &&
        needs.detect-affected.outputs.isChangesetReleaseMerge != 'true' &&
        contains(fromJSON('["success","skipped"]'), needs.quality-react.result) &&
        contains(fromJSON('["success","skipped"]'), needs.build-react.result) &&
        contains(fromJSON('["success","skipped"]'), needs.quality-angular.result) &&
        contains(fromJSON('["success","skipped"]'), needs.build-angular.result)
      }}
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Create/Update Release Pull Request
        id: changesets
        uses: changesets/action@v1.5.3
        with:
          title: "chore(release): update package versions"
          commit: "chore(release): update package versions"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        run: npm run changelog

      - name: Commit changelog to PR
        if: steps.changesets.outputs.pullRequestNumber
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: update main changelog" --no-verify || exit 0
          git push origin -u changeset-release/main

      - name: Trigger Storybook Preview
        run: |
          gh workflow run storybook-preview.yaml \
            --ref main \
            --field branch=changeset-release/main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

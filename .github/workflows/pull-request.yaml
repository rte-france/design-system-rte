name: Pull request CI

on:
  pull_request:
    branches:
      - main

permissions: read-all

jobs:
  detect-affected:
    name: Detect affected packages
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.detect.outputs.core }}
      react: ${{ steps.detect.outputs.react }}
      angular: ${{ steps.detect.outputs.angular }}
      isHotfix: ${{ steps.detect.outputs.isHotfix }}
      isChangesetRelease: ${{ steps.detect.outputs.isChangesetRelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files and derive flags
        id: detect
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          baseSha="${{ github.event.pull_request.base.sha }}"
          headSha="${{ github.event.pull_request.head.sha }}"

          changedFiles="$(git diff --name-only "$baseSha" "$headSha")"

          echo "Changed files:"
          echo "$changedFiles"

          isHotfix="false"
          if [[ "${HEAD_REF}" == hotfix/* ]]; then
            isHotfix="true"
          fi

          isChangesetRelease="false"
          if [[ "${HEAD_REF}" == changeset-release/* ]]; then
            isChangesetRelease="true"
          fi

          coreChanged="false"
          reactChanged="false"
          angularChanged="false"

          if echo "$changedFiles" | grep -qE '^packages/core/'; then
            coreChanged="true"
          fi
          if echo "$changedFiles" | grep -qE '^packages/react/'; then
            reactChanged="true"
          fi
          if echo "$changedFiles" | grep -qE '^packages/angular/'; then
            angularChanged="true"
          fi

          core="$coreChanged"
          react="$reactChanged"
          angular="$angularChanged"

          if [[ "$coreChanged" == "true" ]]; then
            react="true"
            angular="true"
          fi
          if [[ "$reactChanged" == "true" || "$angularChanged" == "true" ]]; then
            core="true"
          fi

          echo "core=$core" >> "$GITHUB_OUTPUT"
          echo "react=$react" >> "$GITHUB_OUTPUT"
          echo "angular=$angular" >> "$GITHUB_OUTPUT"
          echo "isHotfix=$isHotfix" >> "$GITHUB_OUTPUT"
          echo "isChangesetRelease=$isChangesetRelease" >> "$GITHUB_OUTPUT"

  sonarqube-tutorial:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: detect-affected
    if: ${{ !startsWith(github.head_ref, 'dependabot/') && needs.detect-affected.outputs.isHotfix != 'true' && needs.detect-affected.outputs.isChangesetRelease != 'true' }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: SonarQubeScan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  global-install:
    runs-on: ubuntu-latest
    needs: detect-affected
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Cache node_modules and Vite cache
        id: cache-packages
        uses: actions/cache/save@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
            ./packages/core/node_modules
          key: deps-node20-PR-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Cache icons
        id: cache-icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Generate icons
        if: ${{ needs.detect-affected.outputs.react == 'true' || needs.detect-affected.outputs.angular == 'true' }}
        run: npm run generate:icons

      - name: Build Core Package
        working-directory: packages/core
        run: npm run build

      - name: Cache Build Core
        id: cache-build-core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

  build-react:
    runs-on: ubuntu-latest
    needs: [detect-affected, global-install]
    if: ${{ needs.detect-affected.outputs.react == 'true' && needs.detect-affected.outputs.isHotfix != 'true' && needs.detect-affected.outputs.isChangesetRelease != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
            ./packages/core/node_modules
          key: deps-node20-PR-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache build core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Build React Package
        working-directory: packages/react
        run: npm run build

      - name: Save react build cache
        uses: actions/cache/save@v4
        with:
          path: ./packages/react/dist
          key: react-build-${{ hashFiles('packages/react/src/**', 'packages/react/package.json') }}

  quality-react:
    runs-on: ubuntu-latest
    needs: build-react
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
            ./packages/core/node_modules
          key: deps-node20-PR-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache build core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore react build cache
        uses: actions/cache/restore@v4
        with:
          path: ./packages/react/dist
          key: react-build-${{ hashFiles('packages/react/src/**', 'packages/react/package.json') }}

      - name: Lint
        working-directory: packages/react
        run: npm run lint

      - name: Run tests
        working-directory: packages/react
        run: npm run test:ci

  build-angular:
    runs-on: ubuntu-latest
    needs: [detect-affected, global-install]
    if: ${{ needs.detect-affected.outputs.angular == 'true' && needs.detect-affected.outputs.isHotfix != 'true' && needs.detect-affected.outputs.isChangesetRelease != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
            ./packages/core/node_modules
          key: deps-node20-PR-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache build core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Build Angular Package
        working-directory: packages/angular
        run: npm run build

      - name: Save angular build cache
        uses: actions/cache/save@v4
        with:
          path: ./packages/angular/dist
          key: angular-build-${{ hashFiles('packages/angular/projects/**', 'packages/angular/package.json') }}

  quality-angular:
    runs-on: ubuntu-latest
    needs: build-angular
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
            ./packages/core/node_modules
          key: deps-node20-PR-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache icons
        uses: actions/cache@v4
        with:
          path: |
            ./packages/react/src/components/icon/generated
            ./packages/angular/projects/ds-rte-lib/src/lib/assets/icons
          key: icons-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Restore cache build core
        uses: actions/cache@v4
        with:
          path: |
            ./packages/core/css
            ./packages/core/dist
          key: build-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Lint
        working-directory: packages/angular
        run: npm run lint

      - name: Run tests
        working-directory: packages/angular
        run: npm run test:ci

  quality-core:
    runs-on: ubuntu-latest
    needs: [detect-affected, global-install]
    if: ${{ needs.detect-affected.outputs.isChangesetRelease != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache node_modules and Vite cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/react/node_modules
            ./packages/react/.vite
            ./packages/angular/node_modules
            ./packages/angular/.vite
            ./packages/core/node_modules
          key: deps-node20-PR-${{ hashFiles('package-lock.json') }}-${{ github.sha }}

      - name: Lint
        working-directory: packages/core
        run: npm run lint

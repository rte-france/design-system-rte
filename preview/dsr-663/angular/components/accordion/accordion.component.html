<div class="accordion">
  <button
    class="rte-accordion-summary {{ appearance() }} size-{{ size() }}"
    type="button"
    [class.compact-spacing]="compactSpacing()"
    [disabled]="disabled()"
    [attr.aria-expanded]="internalOpen()"
    [attr.aria-controls]="contentElementId()"
    (click)="onSummaryClick($event)"
  >
    <div class="rte-accordion-summary-row" [id]="summaryElementId()">
      @if (alignement() === "left") {
        <rte-icon
          class="rte-accordion-chevron"
          name="arrow-chevron-down"
          [class.animating]="isAnimating()"
          [size]="iconPixelSize()"
        />
      }
      @if (icon(); as iconName) {
        <rte-icon [name]="iconName" [size]="iconPixelSize()" />
      }
      <span class="rte-accordion-title size-{{ size() }}">{{ title() }}</span>
      @if (alignement() === "right") {
        <rte-icon
          class="rte-accordion-chevron"
          name="arrow-chevron-down"
          [class.animating]="isAnimating()"
          [size]="iconPixelSize()"
        />
      }
    </div>
  </button>
  <div
    #accordionContent
    class="rte-accordion-panel"
    [class.animating]="isAnimating()"
    [class.is-disabled]="disabled()"
    [attr.aria-hidden]="!internalOpen()"
    [id]="contentElementId()"
    [style.height.px]="panelHeightPx()"
  >
    <ng-content />
  </div>
  <rte-divider thickness="light" />
</div>

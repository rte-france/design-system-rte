<rte-base-input
  rightIcon="calendar-month"
  rightIconSize="m"
  [id]="id()"
  [useLabelForAttribute]="false"
  [label]="hasLabel() ? label() : ''"
  [labelPosition]="labelPosition()"
  [required]="required()"
  [showLabelRequirement]="showLabelRequirement()"
  [assistiveAppearance]="assistiveAppearance()"
  [showAssistiveIcon]="showAssistiveIcon()"
  [assistiveTextLabel]="hasAssistiveText() ? assistiveTextLabel() : ''"
  [assistiveTextId]="assistiveTextId()"
  [error]="error()"
  [maxLength]="10"
  [disabled]="disabled()"
  [readOnly]="readOnly()"
  [highlighted]="highlighted()"
  [width]="'100%'"
  [rightIconAriaLabel]="rightIconAriaLabel()"
  (rightIconClick)="onRightIconClickHandler($event)"
  (rightIconKeydown)="onRightIconKeyDownHandler($event)"
>
  <div
    #controlRef
    rteBaseInputControl
    class="segmented-date-field"
    role="group"
    [id]="id()"
    [ngClass]="{
      'segmented-date-field--read-only': readOnly(),
    }"
    [attr.aria-label]="ariaLabel() || null"
    [attr.aria-labelledby]="ariaLabelledby()"
    [attr.aria-required]="ariaRequired()"
    [attr.aria-describedby]="assistiveTextId()"
    [attr.aria-description]="ariaDescriptionForSegmentedGroup()"
    [attr.aria-activedescendant]="ariaActiveDescendantForSegmentedGroup()"
    [attr.tabindex]="disabled() ? -1 : 0"
    [attr.aria-disabled]="disabled() ? true : null"
    (keydown)="onControlKeydown($event)"
    (click)="onSegmentedControlClick()"
    (focus)="onControlFocus()"
    (blur)="onControlBlur()"
    (paste)="onPaste($event)"
  >
    <span
      #daySegment
      class="segment"
      [attr.id]="segmentElementId('day')"
      [attr.aria-hidden]="segmentAriaHidden('day') ? true : null"
      [class.segment--active]="isSegmentActive('day')"
      [class.segment--muted]="segmentedState().dayDigits.length === 0"
      (click)="selectSegment('day')"
    >
      {{ dayDisplay() }}
    </span>
    <span class="segment-separator" aria-hidden="true">/</span>
    <span
      #monthSegment
      class="segment"
      [attr.id]="segmentElementId('month')"
      [attr.aria-hidden]="segmentAriaHidden('month') ? true : null"
      [class.segment--active]="isSegmentActive('month')"
      [class.segment--muted]="segmentedState().monthDigits.length === 0"
      (click)="selectSegment('month')"
    >
      {{ monthDisplay() }}
    </span>
    <span class="segment-separator" aria-hidden="true">/</span>
    <span
      #yearSegment
      class="segment"
      [attr.id]="segmentElementId('year')"
      [attr.aria-hidden]="segmentAriaHidden('year') ? true : null"
      [class.segment--active]="isSegmentActive('year')"
      [class.segment--muted]="segmentedState().yearDigits.length === 0"
      (click)="selectSegment('year')"
    >
      {{ yearDisplay() }}
    </span>
  </div>
</rte-base-input>

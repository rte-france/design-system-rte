<div
  class="rte-tag"
  [attr.data-tag-type]="tagType()"
  [attr.data-status]="status()"
  [attr.data-color]="color()"
  [attr.data-compact-spacing]="compactSpacing()"
  [attr.aria-label]="ariaLabel()"
>
  <ng-container *ngIf="isValidIconName() && (tagType() === 'status' || showLeftIcon())">
    <rte-icon [name]="computedIconName()" [size]="16"></rte-icon>
  </ng-container>
  <ng-container *ngIf="label">
    <span class="tag-label" [attr.data-compact-spacing]="compactSpacing()">{{ label() }}</span>
  </ng-container>
</div>

@if (isCollapsed() && label()) {
  @if (link()) {
    <a
      class="nav-item-container {{ appearance() }}"
      rteTooltip
      rteTooltipPosition="right"
      rteTooltipAlignment="center"
      [id]="id()"
      [ngClass]="{ collapsed: isCollapsed(), nested: isNested(), active: active(), focused: focused() }"
      [attr.role]="role()"
      [rteTooltip]="label()"
      [rteTooltipArrow]="false"
      [rteTooltipGap]="12"
      [rteTooltipShouldFocusTrigger]="true"
      [href]="link()!"
      [attr.aria-label]="label()"
    >
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </a>
  } @else {
    <div
      class="nav-item-container {{ appearance() }}"
      rteTooltip
      rteTooltipPosition="right"
      rteTooltipAlignment="center"
      [id]="id()"
      [ngClass]="{ collapsed: isCollapsed(), nested: isNested(), active: active(), focused: focused() }"
      [attr.role]="role()"
      [rteTooltip]="label()"
      [rteTooltipArrow]="false"
      [rteTooltipGap]="12"
      [rteTooltipShouldFocusTrigger]="false"
    >
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </div>
  }
} @else {
  @if (link()) {
    <a
      class="nav-item-container {{ appearance() }}"
      [id]="id()"
      [ngClass]="{ collapsed: isCollapsed(), nested: isNested(), active: active(), focused: focused() }"
      [attr.role]="role()"
      [href]="link()!"
    >
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </a>
  } @else {
    <div
      class="nav-item-container {{ appearance() }}"
      [id]="id()"
      [ngClass]="{ collapsed: isCollapsed(), nested: isNested(), active: active(), focused: focused() }"
      [attr.role]="role()"
    >
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </div>
  }
}

<ng-template #contentTemplate>
  <span
    class="nav-item"
    [attr.tabindex]="link() ? undefined : tabIndex()"
    [attr.aria-label]="label()"
    (click)="handleClick($event)"
    (keydown)="handleKeyDown($event)"
    (focus)="handleFocus()"
    (blur)="handleBlur()"
  >
    <div class="nav-item-left">
      @if (hasLeadingIcon() && icon()) {
        @if (shouldShowCollapsedBadge()) {
          <span
            class="nav-item-icon-badge-host"
            rteBadge
            rteBadgeSize="xs"
            rteBadgeContent="empty"
            [rteBadgeType]="collapsedBadgeType()"
          >
            <rte-icon class="icon" [name]="icon()!" [size]="iconSize()" />
          </span>
        } @else {
          <rte-icon class="icon" [name]="icon()!" [size]="iconSize()" />
        }
      }
      @if (!isCollapsed()) {
        <span>{{ label() }}</span>
      }
    </div>
    <div class="nav-item-right">
      @if (shouldShowExpandedBadge()) {
        <rte-badge
          [badgeType]="badge()!.badgeType || 'brand'"
          [badgeSize]="badge()!.size || 'm'"
          [badgeContent]="badge()!.content || 'number'"
          [count]="badge()!.count"
          [icon]="badge()!.icon || 'notification'"
          [simpleBadge]="true"
        />
      }
    </div>
  </span>
</ng-template>

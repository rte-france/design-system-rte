<a class="rte-header-home" [href]="homeLink()" [attr.aria-label]="homeAriaLabel()">
  @if (shouldRenderLogo()) {
    <img class="rte-header-logo" alt="" aria-hidden="true" [src]="logoSrc()" />
  }

  @if (applicationName()) {
    <span class="rte-header-app-name">{{ applicationName() }}</span>
  }
</a>
